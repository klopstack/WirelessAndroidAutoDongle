name: Build images + OTA

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        defconfig:
        - raspberrypi0w
        - raspberrypizero2w
        - raspberrypi4
        - raspberrypi3a
        - raspberrypi5

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Compute build version
      id: version
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
          ver="${GITHUB_REF#refs/tags/}"
        else
          ver="dev-$(date -u +%Y%m%d)"
        fi
        echo "version=$ver" >> "$GITHUB_OUTPUT"

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential bc bison flex cpio rsync file wget curl \
          libncurses5-dev libssl-dev python3 unzip

    - name: Prepare SWUpdate signing key
      if: ${{ github.event_name != 'pull_request' }}
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p keys
        printf '%s' "${SWUPDATE_SIGNING_KEY}" > keys/swupdate_signing.key
        chmod 600 keys/swupdate_signing.key
        openssl pkey -in keys/swupdate_signing.key -pubout > keys/public.pem
        cp -f keys/public.pem aa_wireless_dongle/board/common/rootfs_overlay/etc/swupdate/public.pem
      env:
        SWUPDATE_SIGNING_KEY: ${{ secrets.SWUPDATE_SIGNING_KEY }}

    - name: Setup config
      run: make BR2_EXTERNAL=../aa_wireless_dongle/ O=output/${{ matrix.defconfig }} ${{ matrix.defconfig }}_defconfig
      working-directory: ./buildroot

    - name: Build
      run: make BR2_EXTERNAL=../aa_wireless_dongle/ O=output/${{ matrix.defconfig }} AAWG_VERSION=${{ steps.version.outputs.version }}
      working-directory: ./buildroot

    - name: Create signed OTA bundle (update.swu)
      if: ${{ github.event_name != 'pull_request' }}
      run: |
        ./scripts/ota/make-update-bundles.sh --board "${{ matrix.defconfig }}" --signing-key keys/swupdate_signing.key

    - name: Package artifacts
      shell: bash
      run: |
        set -euo pipefail
        outdir="dist/${{ matrix.defconfig }}"
        mkdir -p "$outdir"
        img="./buildroot/output/${{ matrix.defconfig }}/images/sdcard.img"
        xz -c "$img" > "$outdir/${{ matrix.defconfig }}-${{ steps.version.outputs.version }}-sdcard.img.xz"

        if [[ "${{ github.event_name }}" != "pull_request" ]]; then
          swu="./buildroot/output/${{ matrix.defconfig }}/images/update.swu"
          xz -c "$swu" > "$outdir/${{ matrix.defconfig }}-${{ steps.version.outputs.version }}-update.swu.xz"
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: WirelessAndroidAutoDongle-${{ matrix.defconfig }}
        path: dist/${{ matrix.defconfig }}/*
  
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/upload-artifact/merge@v4
        with:
          name: WirelessAndroidAutoDongle-all

  publish-dev:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WirelessAndroidAutoDongle-all
          path: dist

      - name: Compute dev version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=dev-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Publish dev release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev build ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: false
          body: |
            Automated dev build from `main`.

            Version: `${{ steps.version.outputs.version }}`
            Commit: `${{ github.sha }}`
          files: |
            dist/**/*.xz

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WirelessAndroidAutoDongle-all
          path: dist

      - name: Publish tagged release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          files: |
            dist/**/*.xz
