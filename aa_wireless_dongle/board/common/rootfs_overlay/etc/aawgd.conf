#!/bin/sh

######## Configuration options for Android Auto Wireless Dongle ########

## Set the connection strategy to use
## 0 - Dongle mode. Waits for both dongle and headunit bluetooth connections and then starts the wifi and usb connections.
## 1 - Phone first (default). Waits for the phone bluetooth and wifi to connect first, and then starts the usb connection.
## 2 - Usb first. Waits for the usb to connect first, and then starts the bluetooth and wifi connection with phone.
AAWG_CONNECTION_STRATEGY=1

## Override bluetooth device name
## Set a custom bluetooth adapter alias / advertised name.
#AAWG_BLUETOOTH_NAME=EDIT_THIS

## Wifi network name / password
## - AP mode: this is the SSID/password the dongle advertises
## - STA mode: this is the SSID/password the dongle connects to
# In STA mode, SSID/password must be explicitly set.
# In AP mode, SSID may be omitted (defaults to "AAWirelessDongle") and the password
# may be omitted (a random password is generated at boot).
#AAWG_WIFI_SSID=EDIT_THIS
#AAWG_WIFI_PASSWORD=EDIT_THIS

## STA mode requires the AP's BSSID (router radio MAC) for the SSID above.
## Without this, some phones will try to associate to the wrong BSSID and
## Wireless Android Auto will never start the TCP session.
#AAWG_WIFI_BSSID=EDIT_THIS



######## Advanced Configuration ########

## Country code (ISO/IEC 3166-1)
## Used when generating wifi configs (STA mode) and for regulatory domain.
AAWG_COUNTRY_CODE=US

## Wifi mode selection
## - sta: connect to an existing AP (client/station mode)
## - ap: create an access point on wlan0 (phone connects to dongle)
AAWG_WIFI_MODE=ap

## AP mode network settings (only used when AAWG_WIFI_MODE=ap)
AAWG_AP_IP_ADDRESS=10.0.0.1
AAWG_AP_NETMASK=255.255.255.0

## Override bluetooth name suffix
## Set a custom suffix to replace unique id used in "WirelessAADongle-<suffix>" or "AndroidAuto-Dongle-<suffix>"
#AAWG_UNIQUE_NAME_SUFFIX=

## MQTT bridge daemon (optional)
## When enabled, aawgd-mqtt connects to an external MQTT broker and:
## - subscribes to <prefix>/cmd for commands (disconnect, switch <selector>)
## - publishes <prefix>/status with the JSON output of the local LIST command
#AAWG_MQTT_ENABLE=1
#AAWG_MQTT_HOST=your-broker.example.com
#AAWG_MQTT_PORT=1883
#AAWG_MQTT_USERNAME=
#AAWG_MQTT_PASSWORD=
#AAWG_MQTT_CLIENT_ID=aawgd
#AAWG_MQTT_TOPIC_PREFIX=aawgd
#AAWG_MQTT_STATUS_INTERVAL_SEC=5

## Enable SSH
## Enable SSH server to login and access the dongle's command prompt.
## This is usually only required when you're debugging the dongle. Not recommended for normal use.
#AAWG_ENABLE_SSH=1
